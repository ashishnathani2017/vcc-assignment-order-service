name: Deploy To ECS

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: order-service
  STACK_NAME: order-service
  TEMPLATE_FILE: aws/cloudformation/ecs-fargate-service.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login To Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build And Push Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --stack-name $STACK_NAME \
            --template-file $TEMPLATE_FILE \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              ImageUri=${{ steps.build-image.outputs.image }} \
              VpcId=${{ secrets.AWS_VPC_ID }} \
              SubnetIds=${{ secrets.AWS_SUBNET_IDS }} \
              SecurityGroupIds=${{ secrets.AWS_SECURITY_GROUP_IDS }} \
              ListenerArn=${{ secrets.AWS_ALB_LISTENER_ARN }} \
              LoadBalancerFullName=${{ secrets.AWS_ALB_FULL_NAME }} \
              TaskExecutionRoleArn=${{ secrets.AWS_ECS_EXECUTION_ROLE_ARN }} \
              TaskRoleArn=${{ secrets.AWS_ORDER_TASK_ROLE_ARN }} \
              AlarmTopicArn=${{ secrets.AWS_ALARM_TOPIC_ARN }}
